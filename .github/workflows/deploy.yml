name: Deploy to Coolify (Hetzner)

on:
  push:
    branches: [main]
    paths:
      - "tma-web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: coolify-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -euo pipefail
          : "${COOLIFY_BASE_URL:?missing secret COOLIFY_BASE_URL}"
          : "${COOLIFY_API_TOKEN:?missing secret COOLIFY_API_TOKEN}"
          : "${COOLIFY_APP_UUID:?missing secret COOLIFY_APP_UUID}"

          echo "Triggering Coolify deploy for app $COOLIFY_APP_UUID"
          RESP=$(curl -fsS \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE_URL/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=true")
          echo "Coolify response: $RESP"
          DEP_UUID=$(echo "$RESP" | jq -r '.deployments[0].deployment_uuid // empty')
          if [ -z "$DEP_UUID" ]; then
            echo "::error::No deployment_uuid in Coolify response"
            exit 1
          fi
          echo "Deployment queued: $DEP_UUID"

      - name: Poll deployment status
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            STATUS=$(curl -fsS \
              -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_BASE_URL/api/v1/applications/$COOLIFY_APP_UUID" | jq -r '.status // "unknown"')
            echo "[$i] application status: $STATUS"
            case "$STATUS" in
              running:healthy|running:unknown)
                echo "Deploy looks live."
                exit 0
                ;;
              exited|stopped)
                echo "::error::Application is in failure state: $STATUS"
                exit 1
                ;;
            esac
            sleep 15
          done
          echo "::warning::Deployment didn't reach healthy state within 7m30s. Check Coolify UI."
